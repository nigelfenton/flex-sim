# Builds single-file flex-sim executables for Linux / Windows / macOS.
# NOTE: GitHub Actions only runs workflows from a repo's ROOT .github/ — this fires
# once flex-sim lives in its own repository (it's a subdirectory for now).
name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --name flex-sim flex_sim.py
      - uses: actions/upload-artifact@v4
        with:
          name: flex-sim-${{ matrix.os }}
          path: dist/*
